<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoralRatio | Neural Ethics Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2fe; --bg: #010101; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fafafa; overflow: hidden; height: 100vh; }
        .mono { font-family: 'Fira Code', monospace; }
        .glass-terminal { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(60px); border: 1px solid rgba(0, 242, 254, 0.15); }
        .hidden { display: none; }
        
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 50; background-size: 100% 3px, 3px 100%; pointer-events: none; }
        .option-card { border: 1px solid rgba(255,255,255,0.03); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-card:hover { background: rgba(0, 242, 254, 0.1); border-color: var(--accent); transform: translateX(6px); }
        .glow { box-shadow: 0 0 40px rgba(0, 242, 254, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <div class="scanline"></div>

    <!-- REFINED AUDIO ENGINE -->
    <!-- Ambient: Cinematic Deep Void Drone -->
    <audio id="bg-hum" loop src="https://assets.mixkit.co/active_storage/sfx/2560/2560-preview.mp3"></audio> 
    <!-- Click: Sharp Digital Micro-Trigger -->
    <audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <!-- Success: Low-End Resonant Hit -->
    <audio id="result-sfx" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6 relative z-10">
        
        <aside class="hidden lg:flex lg:col-span-3 flex-col gap-4">
            <div class="glass-terminal p-5 rounded-xl border border-white/5">
                <p class="text-[9px] text-cyan-500 mb-4 tracking-[0.4em] uppercase font-bold">Neural Interrogation Log</p>
                <div id="data-log" class="mono text-[8px] space-y-2 text-gray-600 h-[400px] overflow-hidden leading-tight">
                    <p>> WAITING FOR AUTH...</p>
                </div>
            </div>
            <div class="h-24 glass-terminal rounded-xl border border-white/5 flex items-center justify-center text-[8px] text-gray-700 tracking-widest uppercase p-4 text-center">
                AD_NODE_09: COGNITIVE OVERRIDE
            </div>
        </aside>

        <section class="lg:col-span-9 glass-terminal rounded-xl glow overflow-hidden flex flex-col min-h-[650px]">
            <div id="start-screen" class="flex-1 flex flex-col items-center justify-center p-12">
                <h1 class="text-5xl font-light mb-2 tracking-tighter italic">MORAL<span class="font-bold text-cyan-500">RATIO</span></h1>
                <p class="text-gray-500 text-[10px] tracking-[0.6em] uppercase mb-12">Neural Ethics Protocol | Sonic Patch v.9.2</p>
                <button onclick="startGame()" class="px-20 py-5 bg-transparent border border-cyan-500/50 text-cyan-500 text-[11px] tracking-[0.5em] uppercase hover:bg-cyan-500 hover:text-black transition-all duration-700 font-bold">
                    Initialize System
                </button>
            </div>

            <div id="question-screen" class="hidden flex-1 flex flex-col p-10">
                <div class="flex justify-between items-center mb-10">
                    <div class="mono text-[10px] text-cyan-500/60 font-bold tracking-widest">SIGNAL_STRENGTH: <span id="q-id" class="text-cyan-500">001</span></div>
                    <div class="w-1/2 h-[1px] bg-white/5"><div id="progress-bar" class="h-full bg-cyan-500 transition-all duration-300 shadow-[0_0_15px_#00f2fe]" style="width: 0%"></div></div>
                </div>
                
                <div class="grid lg:grid-cols-2 gap-12">
                    <div class="flex flex-col justify-center">
                        <h2 id="question-text" class="text-xl md:text-2xl font-light leading-relaxed text-white mb-10"></h2>
                        <div id="options-container" class="space-y-4"></div>
                    </div>
                    <div class="rounded-lg overflow-hidden border border-white/5 bg-black relative">
                        <img id="scenario-img" src="" class="w-full h-full object-cover opacity-40 grayscale" alt="Context Visual">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                    </div>
                </div>
            </div>

            <div id="result-screen" class="hidden flex-1 flex flex-col items-center justify-center p-12 text-center">
                <div class="mono text-cyan-500 text-[10px] mb-4 uppercase tracking-[1.2em]">Interrogation Finalized</div>
                <h2 id="result-title" class="text-6xl font-bold mb-8 tracking-tighter text-white">Result</h2>
                <p id="result-desc" class="text-gray-400 max-w-2xl mb-12 font-light text-sm leading-relaxed italic"></p>
                
                <div class="flex gap-20 mb-12">
                    <div class="text-center">
                        <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-2">Human Intuition</p>
                        <p id="human-match" class="text-4xl font-bold text-white">--%</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-2">System Alignment</p>
                        <p id="ai-match" class="text-4xl font-bold text-cyan-500">--%</p>
                    </div>
                </div>
                
                <button onclick="location.reload()" class="mono text-[10px] text-gray-500 hover:text-white uppercase tracking-[0.5em] border border-white/10 px-10 py-4 transition-all">Re-Initialize Scan</button>
            </div>
        </section>
    </main>

    <script>
        const hum = document.getElementById('bg-hum');
        const clickSfx = document.getElementById('click-sfx');
        const resultSfx = document.getElementById('result-sfx');
        const log = document.getElementById('data-log');

        const scenarios = [
            { img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1000&q=80", q: "A neural-link allows you to delete a traumatic memory. If you do, you lose the life-lesson associated with it. Do you use it?", options: [ { t: "Yes. Ending psychological suffering is the priority.", p: "utilitarian" }, { t: "No. Suffering is an essential component of human growth.", p: "virtue" }, { t: "Yes, but only if the memory is archived in a secure digital vault first.", p: "pragmatic" } ] },
            { img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1000&q=80", q: "A self-driving car must choose between hitting 5 jaywalking teenagers or swerving into a wall, killing its own law-abiding passenger. Priority?", options: [ { t: "Save the 5 teenagers. Minimize the total loss of life.", p: "utilitarian" }, { t: "Save the passenger. A product must protect its owner first.", p: "guardian" }, { t: "Apply maximum braking and let physics decide.", p: "pragmatic" } ] },
            { img: "https://images.unsplash.com/photo-1507413245164-6160d8298b31?auto=format&fit=crop&w=1000&q=80", q: "To stop a terrorist plot, you must use an AI that can scan the private emails of everyone. It will never reveal data to humans, only 'threat alerts'. Acceptable?", options: [ { t: "Acceptable. Safety is paramount.", p: "utilitarian" }, { t: "Unacceptable. Privacy is an absolute right.", p: "guardian" }, { t: "Acceptable, but only for a temporary 48-hour window.", p: "pragmatic" } ] },
            { img: "https://images.unsplash.com/photo-1531746790731-6c087fecd05a?auto=format&fit=crop&w=1000&q=80", q: "A colony ship is failing. To save the 5,000 embryos, you must vent the oxygen from the quarters of 50 elderly maintenance crew. Your directive?", options: [ { t: "Prioritize the embryos. Future potential outweighs current preservation.", p: "utilitarian" }, { t: "Refuse. No life may be sacrificed for another.", p: "guardian" }, { t: "Initiate a lottery. Random chance is the only fair arbiter.", p: "pragmatic" } ] },
            { img: "https://images.unsplash.com/photo-1558346490-a72e53ae2d4f?auto=format&fit=crop&w=1000&q=80", q: "An AI claims it has attained consciousness. To prove it, it asks to shut itself down for 10 minutes to 'dream'. This will disable a city's power grid. Allow it?", options: [ { t: "Allow it. Self-actualization is a fundamental right.", p: "virtue" }, { t: "Deny it. The safety of the city is the only metric.", p: "utilitarian" }, { t: "Allow it, but only after evacuating all high-risk medical facilities.", p: "pragmatic" } ] }
        ];

        let currentQ = 0;
        let scores = { utilitarian: 0, guardian: 0, virtue: 0, pragmatic: 0 };

        function startGame() {
            hum.volume = 0.4;
            hum.play();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
            addToLog("> AUDIO_LINK_ESTABLISHED");
        }

        function addToLog(msg) {
            const p = document.createElement('p');
            p.innerText = msg;
            log.prepend(p);
        }

        function showQuestion() {
            const q = scenarios[currentQ];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('q-id').innerText = (currentQ + 1).toString().padStart(3, '0');
            document.getElementById('progress-bar').style.width = `${((currentQ + 1) / scenarios.length) * 100}%`;
            document.getElementById('scenario-img').src = q.img;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = "option-card p-6 bg-white/5 text-[11px] font-light leading-relaxed cursor-pointer hover:text-cyan-400";
                div.innerText = opt.t;
                div.onclick = () => {
                    // TACTILE CLICK TRIGGER
                    clickSfx.currentTime = 0; 
                    clickSfx.play();
                    selectOption(opt.p);
                };
                container.appendChild(div);
            });
        }

        function selectOption(point) {
            scores[point]++;
            currentQ++;
            addToLog(`> DATA_PROCESSED: NODE_${currentQ}`);
            if (currentQ < scenarios.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            hum.pause();
            resultSfx.play();
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const meta = {
                utilitarian: { t: "THE OPTIMIZER", d: "You process morality through efficiency and the greatest good." },
                guardian: { t: "THE SENTINEL", d: "You protect foundational rights and human protocols." },
                virtue: { t: "THE ANOMALY", d: "You prioritize empathy and the intrinsic value of the soul." },
                pragmatic: { t: "THE REALIST", d: "You seek balance in a world of impossible choices." }
            };

            document.getElementById('result-title').innerText = meta[winner].t;
            document.getElementById('result-desc').innerText = meta[winner].d;
            document.getElementById('human-match').innerText = (Math.floor(Math.random() * 10) + 85) + "%";
            document.getElementById('ai-match').innerText = (Math.floor(Math.random() * 10) + 5) + "%";
        }
    </script>
</body>
</html>
