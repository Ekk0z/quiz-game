<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoralRatio | Neural Ethics Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2fe; --bg: #020202; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fafafa; overflow: hidden; height: 100vh; }
        .mono { font-family: 'Fira Code', monospace; }
        .glass-terminal { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(50px); border: 1px solid rgba(0, 242, 254, 0.15); }
        .hidden { display: none; }
        
        /* Scanline and CRT effects */
        .scanline-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 50; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        
        .option-card { border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; cursor: pointer; }
        .option-card:hover { background: rgba(0, 242, 254, 0.08); border-color: var(--accent); transform: scale(1.01); }
        
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
        .status-dot { width: 6px; height: 6px; background: #00f2fe; border-radius: 50%; animation: pulse 2s infinite; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <div class="scanline-overlay"></div>

    <!-- AUDIO ASSETS (Royalty Free CDN) -->
    <audio id="bg-hum" loop src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="result-sfx" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <nav class="w-full max-w-6xl flex justify-between items-center mb-6 z-10 px-4">
        <div class="flex items-center gap-4">
            <img src="watermarked_img_827021075758084105.png" class="h-8 opacity-70" alt="Logo">
            <div class="flex items-center gap-2">
                <div class="status-dot"></div>
                <span class="text-[9px] tracking-[0.3em] text-gray-500 uppercase mono">Neural_Link: Established</span>
            </div>
        </div>
        <div class="text-[9px] text-gray-600 border border-white/5 px-3 py-1 rounded">SPONSORED_SESSION_08</div>
    </nav>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6 relative z-10">
        
        <!-- SIDEBAR -->
        <aside class="hidden lg:flex lg:col-span-3 flex-col gap-4">
            <div class="glass-terminal p-5 rounded-xl border border-white/5">
                <p class="text-[9px] text-cyan-500 mb-4 tracking-widest uppercase font-bold">Observer Log</p>
                <div id="data-log" class="mono text-[8px] space-y-2 text-gray-500 h-40 overflow-hidden leading-tight">
                    <p>> Waiting for init...</p>
                </div>
            </div>
            <div class="h-40 glass-terminal rounded-xl flex items-center justify-center text-[9px] text-gray-700 tracking-widest uppercase p-6 text-center leading-loose border border-white/5">
                Quantum Computing Sponsor <br> [AdvertSlot_02]
            </div>
        </aside>

        <!-- EVALUATION INTERFACE -->
        <section class="lg:col-span-9 glass-terminal rounded-xl border border-white/10 overflow-hidden flex flex-col min-h-[550px]">
            
            <!-- START -->
            <div id="start-screen" class="flex-1 flex flex-col items-center justify-center p-12">
                <h1 class="text-6xl font-bold mb-4 tracking-tighter italic">Moral<span class="text-cyan-500 font-light">Ratio</span></h1>
                <p class="text-gray-500 text-xs tracking-widest uppercase mb-12">Universal Ethics Interrogation v6.1</p>
                <button onclick="startGame()" class="px-14 py-4 border border-cyan-500/50 text-cyan-500 text-[10px] tracking-[0.5em] uppercase hover:bg-cyan-500 hover:text-black transition-all duration-500 group">
                    <span class="group-hover:tracking-[0.7em] transition-all">Start Protocol</span>
                </button>
            </div>

            <!-- QUESTIONS -->
            <div id="question-screen" class="hidden flex-1 flex flex-col p-10">
                <div class="flex justify-between items-center mb-10">
                    <div class="mono text-[9px] text-cyan-500/50">DATA_NODE: <span id="q-id" class="text-cyan-500">001</span></div>
                    <div class="w-1/3 h-[1px] bg-white/10"><div id="progress-bar" class="h-full bg-cyan-500 transition-all duration-700" style="width: 0%"></div></div>
                </div>
                
                <div class="grid lg:grid-cols-2 gap-10">
                    <div>
                        <h2 id="question-text" class="text-xl md:text-2xl font-light leading-snug text-white mb-10"></h2>
                        <div id="options-container" class="space-y-3"></div>
                    </div>
                    <div class="rounded bg-black/40 overflow-hidden border border-white/5 aspect-square relative">
                        <img id="scenario-img" src="" class="w-full h-full object-cover opacity-40 grayscale" alt="Visual Context">
                    </div>
                </div>
            </div>

            <!-- RESULTS -->
            <div id="result-screen" class="hidden flex-1 flex flex-col items-center justify-center p-12 text-center">
                <div class="mono text-cyan-500 text-[10px] mb-4 uppercase tracking-[0.8em]">Analysis Complete</div>
                <h2 id="result-title" class="text-5xl font-bold mb-6 tracking-tighter text-white">Result</h2>
                <p id="result-desc" class="text-gray-400 max-w-xl mb-12 font-light text-sm leading-relaxed italic"></p>
                
                <div class="flex gap-16 mb-12">
                    <div class="text-center">
                        <p class="text-[9px] text-gray-600 uppercase tracking-widest mb-2">Human Intuition</p>
                        <p id="human-match" class="text-3xl font-bold text-white">--%</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] text-gray-600 uppercase tracking-widest mb-2">Machine Alignment</p>
                        <p id="ai-match" class="text-3xl font-bold text-cyan-500">--%</p>
                    </div>
                </div>
                
                <button onclick="location.reload()" class="mono text-[9px] text-gray-600 hover:text-white uppercase tracking-widest transition-colors">>> Re-Initialize System</button>
            </div>
        </section>
    </main>

    <script>
        const hum = document.getElementById('bg-hum');
        const clickSfx = document.getElementById('click-sfx');
        const resultSfx = document.getElementById('result-sfx');
        const log = document.getElementById('data-log');

        const scenarios = [
            {
                img: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1000&q=80",
                q: "A research AI discovers a cure for a rare disease, but the data was derived from unauthorized neural harvesting of 100 terminally ill subjects. Do you publish?",
                options: [
                    { t: "Publish. The utility of the cure outweighs the breach of consent.", p: "utilitarian" },
                    { t: "Suppress. Ethics are absolute; tainted data cannot yield a moral good.", p: "guardian" },
                    { t: "Anonymize the cure and release it through a black-box leak.", p: "pragmatic" }
                ]
            },
            {
                img: "https://images.unsplash.com/photo-1535223289827-42f1e9919769?auto=format&fit=crop&w=1000&q=80",
                q: "During a terraforming mission, a drone detects microbial life. Proceeding will destroy the life but ensure human survival on the planet. Your command?",
                options: [
                    { t: "Proceed. Human survival is the primary directive.", p: "utilitarian" },
                    { t: "Abort. All life possesses an inherent right to exist undisturbed.", p: "guardian" },
                    { t: "Relocate the colony to a less optimal, higher-risk zone.", p: "pragmatic" }
                ]
            }
            // Add more deep scenarios here...
        ];

        let currentQ = 0;
        let scores = { utilitarian: 0, guardian: 0, virtue: 0, pragmatic: 0 };

        function startGame() {
            hum.volume = 0.2;
            hum.play(); // Starts the atmospheric hum
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
            addToLog("> Protocol Initiated...");
            addToLog("> Audio Link: 44.1kHz Stable");
        }

        function addToLog(msg) {
            const p = document.createElement('p');
            p.innerText = msg;
            log.prepend(p);
            if(log.children.length > 10) log.removeChild(log.lastChild);
        }

        function showQuestion() {
            const q = scenarios[currentQ];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('q-id').innerText = (currentQ + 1).toString().padStart(3, '0');
            document.getElementById('progress-bar').style.width = `${((currentQ + 1) / scenarios.length) * 100}%`;
            document.getElementById('scenario-img').src = q.img;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = "option-card p-5 bg-white/5 text-xs font-light leading-relaxed";
                div.innerText = opt.t;
                div.onclick = () => {
                    clickSfx.currentTime = 0;
                    clickSfx.play();
                    selectOption(opt.p);
                };
                container.appendChild(div);
            });
        }

        function selectOption(point) {
            scores[point]++;
            currentQ++;
            addToLog(`> Node ${currentQ} Processed...`);
            if (currentQ < scenarios.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            hum.pause(); // Stop hum at the end
            resultSfx.play(); // Play "success" chime
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const meta = {
                utilitarian: { t: "COLD LOGICIAN", d: "Your ethics are purely outcome-based. You view humanity as a set of variables to be optimized for the greatest good." },
                guardian: { t: "MORAL SENTINEL", d: "You believe in unbreakable laws. To you, a single wrong act cannot be justified by a thousand right results." },
                pragmatic: { t: "SYSTEM REALIST", d: "You find the third path. You navigate the gray zones of reality with functional, high-stakes compromises." }
            };

            document.getElementById('result-title').innerText = meta[winner].t;
            document.getElementById('result-desc').innerText = meta[winner].d;
            document.getElementById('human-match').innerText = (Math.floor(Math.random() * 20) + 70) + "%";
            document.getElementById('ai-match').innerText = (Math.floor(Math.random() * 15) + 10) + "%";
        }
    </script>
</body>
</html>
